<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon programme</title>
<style>
  :root{
    --bg:#0A0A0C;
    --card:#141417;
    --line: rgba(255,255,255,0.08);
    --ink:#FFFFFF;
    --ink-dim:#9A98A0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden;}
  .view{display:none;}
  .view.active{display:block;}

  /* ================= HOME ================= */
  #home .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:22px 20px 6px;
  }
  .eyebrow{
    font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:700;margin:0 0 4px;
  }
  h1.title{font-size:30px;font-weight:800;margin:0;letter-spacing:-0.01em;}

  .ring-logo{width:42px;height:42px;position:relative;flex-shrink:0;margin-top:2px;}
  .ring-logo svg{width:100%;height:100%;}

  .grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    padding:18px 16px 40px;
  }
  .tile{
    position:relative;border-radius:22px;overflow:hidden;
    height:180px;
    cursor:pointer;border:1px solid var(--line);
  }
  .tile img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;
    display:block;
  }
  .tile::before{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg, rgba(10,10,12,0.02) 45%, rgba(10,10,12,0.88) 100%);
  }
  .tile-badge{
    position:absolute;top:10px;right:10px;z-index:2;
    display:flex;align-items:center;gap:6px;
    background:rgba(10,10,12,0.55);backdrop-filter:blur(6px);
    padding:5px 10px 5px 8px;border-radius:20px;
    font-size:11px;font-weight:700;letter-spacing:0.02em;
  }
  .tile-badge .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .tile-info{position:absolute;bottom:12px;left:14px;right:14px;z-index:2;}
  .tile-info h3{margin:0 0 3px;font-size:19px;font-weight:800;letter-spacing:0.01em;}
  .tile-info p{margin:0;font-size:12px;color:rgba(255,255,255,0.75);}
  .tile-level{
    position:absolute;top:10px;left:10px;z-index:2;
    background:rgba(10,10,12,0.55);backdrop-filter:blur(6px);
    padding:5px 10px;border-radius:20px;
    font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  }

  /* ================= DETAIL (WEEK -> DAYS) ================= */
  .hero{
    position:relative;height:400px;overflow:hidden;
  }
  .hero img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:block;
  }
  .hero::before{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg, rgba(10,10,12,0.1) 0%, rgba(10,10,12,0.3) 45%, rgba(10,10,12,0.96) 100%);
  }
  .back-btn{
    position:absolute;top:22px;left:16px;z-index:3;
    width:36px;height:36px;border-radius:50%;
    background:rgba(20,20,23,0.6);border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .back-btn svg{width:16px;height:16px;}
  .hero-content{position:absolute;left:20px;right:20px;bottom:22px;z-index:3;}
  .hero-eyebrow{
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;
    color:rgba(255,255,255,0.7);margin:0 0 6px;
  }
  .hero-content h2{font-size:38px;font-weight:800;margin:0 0 10px;letter-spacing:-0.01em;}
  .stats-row{display:flex;gap:22px;align-items:center;}
  .stat{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;color:#E9E8EC;}
  .stat svg{width:17px;height:17px;flex-shrink:0;}

  .collapse-hint{display:flex;justify-content:center;padding:14px 0 6px;color:rgba(255,255,255,0.3);}
  .collapse-hint svg{width:22px;height:22px;}

  /* Day tiles grid (matches home tile style, 2 per row) */
  .day-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    padding:6px 16px 24px;
  }
  .day-tile{
    position:relative;border-radius:20px;overflow:hidden;
    height:150px;cursor:pointer;border:1px solid var(--line);
  }
  .day-tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:block;}
  .day-tile::before{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg, rgba(10,10,12,0.05) 40%, rgba(10,10,12,0.9) 100%);
  }
  .day-tile-badge{
    position:absolute;top:9px;right:9px;z-index:2;
    background:rgba(10,10,12,0.55);backdrop-filter:blur(6px);
    padding:4px 9px;border-radius:16px;font-size:10.5px;font-weight:700;
  }
  .day-tile-num{
    position:absolute;top:9px;left:9px;z-index:2;
    width:24px;height:24px;border-radius:50%;
    background:rgba(10,10,12,0.55);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;
  }
  .day-tile-info{position:absolute;bottom:10px;left:12px;right:12px;z-index:2;}
  .day-tile-info h4{margin:0;font-size:15px;font-weight:800;line-height:1.2;}
  .day-tile.expanded{outline:2px solid #4E9CFF;}

  /* inline youtube expand card, shown full-width below the day grid */
  .video-panel{
    max-height:0;overflow:hidden;transition:max-height .35s ease;
    background:#000;margin:0 16px;border-radius:16px;
  }
  .video-panel.open{max-height:420px;margin-bottom:12px;}
  .video-panel-inner{padding:10px 0 0;}
  .video-close-row{
    display:flex;justify-content:space-between;align-items:center;gap:6px;
    padding:0 2px 10px;color:var(--ink-dim);font-size:12px;font-weight:700;
    letter-spacing:0.05em;cursor:pointer;
  }
  .video-close-row svg{width:13px;height:13px;}

  .video-stage{
    position:relative;width:100%;aspect-ratio:16/9;
    border-radius:16px;overflow:hidden;background:#000;
  }
  .video-stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:block;}
  .video-stage .scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.85) 100%);
  }
  .video-caption{
    position:absolute;left:14px;bottom:44px;right:14px;z-index:2;
    font-size:13px;font-weight:700;color:#fff;
    text-shadow:0 1px 6px rgba(0,0,0,0.6);
  }
  .video-play-big{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:56px;height:56px;border-radius:14px;background:#FF3B30;
    display:flex;align-items:center;justify-content:center;z-index:3;cursor:pointer;
    box-shadow:0 6px 20px rgba(255,59,48,0.4);
  }
  .video-play-big svg{width:20px;height:20px;margin-left:3px;}
  .yt-bar{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;align-items:center;justify-content:flex-end;gap:6px;
    padding:8px 12px;font-size:12px;font-weight:700;color:#fff;
  }
  .yt-bar svg{width:20px;height:14px;}
  .video-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:4;}

  .footer-bar{
    position:sticky;bottom:0;margin:18px 16px 20px;
    background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .footer-bar span:first-child{color:var(--ink-dim);font-size:13px;font-weight:600;}
  .footer-bar span:last-child{font-size:19px;font-weight:800;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
  button, .tile, .day-tile, .back-btn, .video-close-row, .video-play-big{outline-offset:2px;}
  button:focus-visible, .tile:focus-visible, .day-tile:focus-visible{outline:2px solid #fff;}
</style>
</head>
<body>

<div class="app">

  <!-- ================= HOME VIEW : 6 DOMAINES ================= -->
  <div class="view active" id="home">
    <div class="topbar">
      <div>
        <p class="eyebrow">Programme 6 semaines</p>
        <h1 class="title">Mon programme</h1>
      </div>
      <div class="ring-logo">
        <svg viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="18" fill="none" stroke="#FF4D67" stroke-width="3.5" stroke-dasharray="70 45" stroke-linecap="round" transform="rotate(-90 21 21)"/>
          <circle cx="21" cy="21" r="13" fill="none" stroke="#34D399" stroke-width="3.5" stroke-dasharray="55 30" stroke-linecap="round" transform="rotate(-60 21 21)"/>
          <circle cx="21" cy="21" r="8" fill="none" stroke="#4E9CFF" stroke-width="3.5" stroke-dasharray="35 15" stroke-linecap="round" transform="rotate(-30 21 21)"/>
        </svg>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- ================= DETAIL VIEW : TUILES DE JOUR ================= -->
  <div class="view" id="detail">
    <div class="hero" id="detailHero">
      <div class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
      </div>
      <div class="hero-content">
        <p class="hero-eyebrow" id="detailLevel"></p>
        <h2 id="detailTitle"></h2>
        <div class="stats-row">
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="#FBBF24"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>
            <span id="detailKcal"></span>
          </div>
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="#E9E8EC" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            <span id="detailTime"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="collapse-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 8l6 6 6-6"/><path d="M6 13l6 6 6-6"/></svg>
    </div>

    <div class="day-grid" id="dayGrid"></div>
    <div id="videoSlot"></div>

    <div class="footer-bar">
      <span>Durée totale</span>
      <span id="footerTotal"></span>
    </div>
  </div>

</div>

<script>
  const colors = ["#4E9CFF","#FF4D67","#34D399","#FBBF24","#A78BFA","#D1D5DB"];

  // real, royalty-free Unsplash photos (Unsplash License — free to use)
  function u(id){ return `https://images.unsplash.com/${id}?auto=format&fit=crop&w=1200&q=80`; }
  const heroPhotos = [
    u('photo-1571019613454-1cb2f99b2d8b'), // Semaine 1
    u('photo-1541534741688-6078c6bfb5c5'), // Semaine 2
    u('photo-1485727749690-d091e8284ef3'), // Semaine 3
    u('photo-1434596922112-19c563067271'), // Semaine 4
    u('photo-1574680178050-55c6a6a96e0a'), // Semaine 5
    u('photo-1518611012118-696072aa579a')  // Semaine 6
  ];
  const dayPhotos = [
    u('photo-1594381898411-846e7d193883'),
    u('photo-1550345332-09e3ac987658'),
    u('photo-1546483875-ad9014c88eba'),
    u('photo-1649887974297-4be052375a67'),
    u('photo-1571731956672-f2b94d7dd0cb'),
    u('photo-1517836357463-d25dfeac3438')
  ];

  // real img tag with a graceful fallback if a photo fails to load
  function imgTag(src, alt){
    return `<img src="${src}" alt="${alt}" loading="lazy" onerror="this.style.display='none'">`;
  }

  // ===================== DONNÉES DU PROGRAMME (6 domaines) =====================
  const weeksData = [
    {
      title: "Semaine 1",
      level: "Débutant",
      exercises: [
        { name: "Abdos / Fessiers", duration: 10, id: "gKEGtPB1GOk" },
        { name: "Abdos / Fessiers", duration: 18, id: "IDkVSs-rHjU" },
        { name: "Fessiers",         duration: 20, id: "7Aiu168ItwE" },
        { name: "Hit",              duration: 8,  id: "VyjJ1rDRups" }
      ]
    },
    {
      title: "Semaine 2",
      level: "Débutant",
      exercises: [
        { name: "Hit",       duration: 9,  id: "gGQXjL125Ds" },
        { name: "Abdos",     duration: 12, id: "eEmLqnaAQT0" },
        { name: "Pilates",   duration: 20, id: "Gx04Z8TV7Bg" },
        { name: "Bras",      duration: 10, id: "V436C5c2j48" },
        { name: "Fessiers",  duration: 8,  id: "wUnYEn3dA3I" }
      ]
    },
    {
      title: "Semaine 3",
      level: "Intermédiaire",
      exercises: [
        { name: "Abdos / Fessiers", duration: 15, id: "RTBbdxMs4P0" },
        { name: "Hanche",           duration: 15, id: "uieo0Za1EmU" },
        { name: "Jambe",            duration: 20, id: "wvY8sxlzveI" },
        { name: "Hit",              duration: 15, id: "vMATl4DONzc" },
        { name: "Abdos / Bras",     duration: 15, id: "7Lb20roJC78" }
      ]
    },
    {
      title: "Semaine 4",
      level: "Intermédiaire",
      exercises: [
        { name: "Jambe",            duration: 15, id: "YmKAgkIZg54" },
        { name: "Hit",              duration: 15, id: "oPtWGMCVr8U" },
        { name: "Abdos",            duration: 20, id: "yMrGX1aST2A" },
        { name: "Abdos / Fessiers", duration: 25, id: "FWxDrJsSIN4" },
        { name: "Cardio",           duration: 8,  id: "uQEiRFkgWt0" },
        { name: "Cuisse",           duration: 15, id: "doBf7q7b6_k" },
        { name: "Jambe / Fessiers", duration: 20, id: "I2rR31u0_Ng" },
        { name: "Fessiers",         duration: 15, id: "iGKcWCgFMrA" },
        { name: "Bras / Fessiers",  duration: 20, id: "JOYe_8An1cE" },
        { name: "Abdos / Cuisse",   duration: 10, id: "gIoXhfJdauQ" }
      ]
    },
    {
      title: "Semaine 5",
      level: "Intermédiaire",
      exercises: [
        { name: "Fessiers",         duration: 10, id: "-gairiudFSQ" },
        { name: "Ventre",           duration: 8,  id: "Lu9JtHA_1iw" },
        { name: "Abdos / Fessiers", duration: 15, id: "JSEe6x2SWYs" },
        { name: "Fessiers",         duration: 12, id: "5iFDTQM9NVU" },
        { name: "Abdos / Bras",     duration: 12, id: "dW3ORgtAXp8" },
        { name: "Pilates",          duration: 25, id: "9BNeMIOcB-8" },
        { name: "Abdos",            duration: 10, id: "etRyXgxWR_M" }
      ]
    },
    {
      title: "Semaine 6",
      level: "AV",
      exercises: [
        { name: "Cuisse",            duration: 15, id: "doBf7q7b6_k" },
        { name: "Cuisse : Fessiers", duration: 15, id: "5rRyKHPHsd8" },
        { name: "Fessiers",          duration: 25, id: "RmnjHwwrBog" },
        { name: "Cardio",            duration: 35, id: "vz7tGAGARS4" }
      ]
    }
  ];

  const weeks = weeksData.map((w, wi) => {
    const total = w.exercises.reduce((a,b)=>a+b.duration,0);
    const kcal = Math.round(total * 8.5);
    return {
      index: wi,
      title: w.title,
      level: w.level,
      color: colors[wi % colors.length],
      total,
      kcal,
      hero: heroPhotos[wi % heroPhotos.length],
      days: w.exercises.map((ex, di) => ({
        id: ex.id,
        title: ex.name,
        duration: ex.duration + " min",
        photo: dayPhotos[di % dayPhotos.length]
      }))
    };
  });

  // ===================== ACCUEIL : 6 TUILES (une par domaine) =====================
  const gridEl = document.getElementById('grid');
  weeks.forEach((week, wi) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.tabIndex = 0;
    tile.style.background = `linear-gradient(160deg, ${week.color}33, #101014)`;
    tile.innerHTML = `
      ${imgTag(week.hero, week.title)}
      <div class="tile-level">${week.level}</div>
      <div class="tile-badge"><span class="dot" style="background:${week.color}"></span>${week.total} MIN</div>
      <div class="tile-info">
        <h3>${week.title.toUpperCase()}</h3>
        <p>${week.days.length} exercices · ${week.kcal} kcal</p>
      </div>
    `;
    const go = () => openWeek(wi);
    tile.addEventListener('click', go);
    tile.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
    gridEl.appendChild(tile);
  });

  const homeView = document.getElementById('home');
  const detailView = document.getElementById('detail');
  const detailHero = document.getElementById('detailHero');
  const detailLevel = document.getElementById('detailLevel');
  const detailTitle = document.getElementById('detailTitle');
  const detailKcal = document.getElementById('detailKcal');
  const detailTime = document.getElementById('detailTime');
  const dayGrid = document.getElementById('dayGrid');
  const videoSlot = document.getElementById('videoSlot');
  const footerTotal = document.getElementById('footerTotal');

  let openIdx = null;

  // ===================== VUE SEMAINE : TUILES DE JOUR =====================
  function openWeek(wi){
    const week = weeks[wi];
    openIdx = null;

    detailHero.style.background = `linear-gradient(160deg, ${week.color}33, #101014)`;
    const oldImg = detailHero.querySelector('img');
    if(oldImg) oldImg.remove();
    detailHero.insertAdjacentHTML('afterbegin', imgTag(week.hero, week.title));
    detailLevel.textContent = week.level;
    detailTitle.textContent = week.title;
    detailKcal.textContent = week.kcal + " Kcal";
    detailTime.textContent = week.total + " min";
    footerTotal.textContent = week.total + " min";

    dayGrid.innerHTML = '';
    videoSlot.innerHTML = '';

    week.days.forEach((day, idx) => {
      const tile = document.createElement('div');
      tile.className = 'day-tile';
      tile.tabIndex = 0;
      tile.dataset.idx = idx;
      tile.innerHTML = `
        ${imgTag(day.photo, day.title)}
        <div class="day-tile-num">${idx+1}</div>
        <div class="day-tile-badge">${day.duration}</div>
        <div class="day-tile-info"><h4>${day.title}</h4></div>
      `;
      tile.addEventListener('click', () => selectDay(week, wi, idx));
      tile.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();selectDay(week, wi, idx);} });
      dayGrid.appendChild(tile);
    });

    homeView.classList.remove('active');
    detailView.classList.add('active');
    window.scrollTo(0,0);
  }

  // ===================== SÉLECTION D'UN JOUR : ARRIVÉE SUR LE PROGRAMME (VIDÉO) =====================
  function selectDay(week, wi, idx){
    const day = week.days[idx];

    dayGrid.querySelectorAll('.day-tile').forEach(t => t.classList.remove('expanded'));
    const activeTile = dayGrid.querySelector(`.day-tile[data-idx="${idx}"]`);

    if(openIdx === idx){
      // referme si on reclique sur la même tuile
      videoSlot.innerHTML = '';
      openIdx = null;
      return;
    }
    openIdx = idx;
    activeTile.classList.add('expanded');

    videoSlot.innerHTML = `
      <div class="video-panel open">
        <div class="video-panel-inner">
          <div class="video-close-row" id="videoClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            FERMER
          </div>
          <div class="video-stage" id="videoStage" style="background:linear-gradient(160deg, ${week.color}33, #101014)">
            ${imgTag(day.photo, day.title)}
            <div class="scrim"></div>
            <div class="video-caption">${day.title} · ${day.duration} · ${week.title}</div>
            <div class="video-play-big" id="videoPlay">
              <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="yt-bar">
              Regarder sur YouTube
              <svg viewBox="0 0 28 20"><rect width="28" height="20" rx="5" fill="#FF0000"/><path d="M11 6l8 4-8 4z" fill="#fff"/></svg>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('videoClose').addEventListener('click', () => {
      videoSlot.innerHTML = '';
      openIdx = null;
      activeTile.classList.remove('expanded');
    });
    document.getElementById('videoPlay').addEventListener('click', () => {
      const stage = document.getElementById('videoStage');
      stage.innerHTML = `<iframe src="https://www.youtube.com/embed/${day.id}?autoplay=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    });

    // scroll jusqu'au lecteur vidéo
    videoSlot.scrollIntoView({behavior:'smooth', block:'center'});
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    detailView.classList.remove('active');
    homeView.classList.add('active');
  });
</script>

</body>
</html>
